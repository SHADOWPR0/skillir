name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip hatchling
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests
      - run: python scripts/check_neutrality.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip hatchling
      - run: python -m pip install -e .
      - run: skillir compile packs/household-service/skills/inventory-bin-sort
      - run: skillir simulate packs/household-service/skills/inventory-bin-sort
      - run: skillir pack packs/household-service/skills/inventory-bin-sort
